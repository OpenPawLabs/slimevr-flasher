; PlatformIO config for hardware verification probes.
; Installed into the cached firmware checkout and run with that tree as the
; project directory so scripts/, lib/, and src/ resolve correctly.
; Probe sources live in this repo at ../../probes (relative to .cache/firmware).

[platformio]
extra_configs = platformio.ini
default_envs = integration_nodemcu_probe
src_dir = ../../probes

[env:integration_nodemcu_probe]
platform = ${integration_nodemcu_probe.platform}
board = ${integration_nodemcu_probe.board}
custom_slime_board = ${integration_nodemcu_probe.custom_slime_board}
upload_speed = ${integration_nodemcu_probe.upload_speed}
monitor_speed = ${integration_nodemcu_probe.monitor_speed}
monitor_echo = ${integration_nodemcu_probe.monitor_echo}
monitor_filters = ${integration_nodemcu_probe.monitor_filters}
lib_deps = ${integration_nodemcu_probe.lib_deps}
build_flags = ${integration_nodemcu_probe.build_flags}
build_unflags = ${integration_nodemcu_probe.build_unflags}
; Default source filter should be overridden by the flasher or run_test.py helper.
build_src_filter = -<*>

[integration_nodemcu_probe]
; Standalone real-hardware probe env for custom NodeMCU-based dev boards.
platform = espressif8266 @ 4.2.1
board = esp12e
custom_slime_board = BOARD_NODEMCU
upload_speed = 921600
monitor_speed = 115200
monitor_echo = yes
monitor_filters = direct
lib_deps =
  ${env.lib_deps}
build_flags =
  ${env.build_flags}
  -Isrc
  -I../../probes
  -Ilib/bno080
  -Ilib/i2cdev
  -Ilib/math
  -Ilib/vqf
build_unflags = ${env.build_unflags}
